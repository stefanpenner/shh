name: Security

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Install security tools
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Run gosec
        run: gosec -exclude=G104 ./...

      - name: Run staticcheck
        run: staticcheck ./...

  ai-security-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Read security prompt
        id: prompt
        run: |
          {
            echo 'SECURITY_PROMPT<<EOF'
            cat .github/security-review-prompt.md
            echo 'EOF'
          } >> "$GITHUB_ENV"

      - name: AI adversarial security review
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: ${{ env.SECURITY_PROMPT }}
          claude_args: "--allowedTools Edit Write Bash Read Grep Glob WebSearch WebFetch"

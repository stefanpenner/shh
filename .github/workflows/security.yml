name: Security

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *" # Every day at 06:00 UTC
jobs:
  scan:
    runs-on: ubuntu-latest
    outputs:
      report: ${{ steps.report.outputs.SCAN_REPORT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Install security tools
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run scans
        id: report
        run: |
          {
            echo 'SCAN_REPORT<<SCAN_EOF'

            echo '## govulncheck'
            govulncheck ./... 2>&1 || true
            echo ''

            echo '## gosec'
            gosec -fmt=json ./... 2>&1 || true
            echo ''

            echo '## staticcheck'
            staticcheck ./... 2>&1 || true

            echo 'SCAN_EOF'
          } >> "$GITHUB_OUTPUT"

  ai-security-review:
    needs: scan
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Build prompt with scan results
        run: |
          {
            echo 'SECURITY_PROMPT<<EOF'
            cat .github/security-review-prompt.md
            echo ''
            echo '## Static analysis results'
            echo ''
            echo 'The following findings were reported by govulncheck, gosec, and staticcheck.'
            echo 'Triage each finding: fix real issues, and add // nolint or #nosec annotations'
            echo 'with justifications for false positives. Include all fixes in your PR.'
            echo ''
            echo '```'
            echo '${{ needs.scan.outputs.report }}'
            echo '```'
            echo 'EOF'
          } >> "$GITHUB_ENV"

      - name: AI adversarial security review
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: ${{ env.SECURITY_PROMPT }}
          allowed_bots: "claude[bot],claude"
          claude_args: "--allowedTools Edit Write Bash Read Grep Glob WebSearch WebFetch"

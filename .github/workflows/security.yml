name: Security

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *" # Every day at 06:00 UTC
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: Install security tools
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install honnef.co/go/tools/cmd/staticcheck@latest

      # These are informational (continue-on-error) so a newly-disclosed stdlib
      # CVE in govulncheck can't turn the build red on its own. Deep SAST gating
      # is handled by the CodeQL workflow; the steps below surface their real
      # pass/fail status in the run without blocking.
      - name: govulncheck
        continue-on-error: true
        run: govulncheck ./...

      - name: gosec
        continue-on-error: true
        run: gosec ./...

      - name: staticcheck
        continue-on-error: true
        run: staticcheck ./...
